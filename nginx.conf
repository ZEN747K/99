events{}
http {
    upstream backend {
        server backend:5000;
        
    }

    upstream frontend {
        server frontend:80;
        
    }

    server {
        listen 80;

        location / {
            proxy_pass http://frontend;
           
        }

        location /be {
            proxy_pass http://backend; # 1. ระบุพอร์ต 5000 ของ Flask ให้ชัดเจน
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
        }
    }
}
