# เอาคำว่า version: '3.9' ออกเพื่อแก้ปัญหา Warning obsolete
services:
  db:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 246890
      MYSQL_DATABASE: team12
      MYSQL_USER: team12
      MYSQL_PASSWORD: 246890
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "team12", "-p246890"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-setup:
    build: ./backend
    container_name: db-setup
    env_file:
      - ./backend/.env
    command: python sync_db.py 
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      db-setup:
        condition: service_completed_successfully
      redis:
        condition: service_started
    expose:
      - "5000"
    volumes:
      - ./backend:/app
    deploy:
      replicas: 3

  frontend:
    build: ./frontend
    depends_on:
      - backend
    deploy:
      replicas: 3
    expose:
      - "80"

  redis:
    image: redis:latest
    container_name: redis-1
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "8024:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  db_data: